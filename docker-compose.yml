services:
  postgres:
    build:
      context: ./postgres-pgroonga
      dockerfile: Dockerfile
      args:
        PG_VERSION: 17
    image: jiten/postgres-pgroonga:17
    shm_size: 1gb
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_MULTIPLE_DATABASES: ${DB_NAME},umami
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
      - ./postgres-config:/etc/postgresql/conf.d
    command: postgres -c config_file=/var/lib/postgresql/data/postgresql.conf -c hba_file=/var/lib/postgresql/data/pg_hba.conf
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Jiten.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      voicevox:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      - ConnectionStrings__JitenDatabase=Host=${DB_HOST:-postgres};Database=${DB_NAME:-jiten};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-password};Timeout=300;CommandTimeout=300
      - ConnectionStrings__Redis=redis:${REDIS_PORT:-6379}
      - JwtSettings__Secret=${JWT_SECRET:-VERY_STRONG_KEY_AT_LEAST_32_CHARS}
      - JwtSettings__Issuer=${JWT_ISSUER:-https://api.jiten.moe}
      - JwtSettings__Audience=${JWT_AUDIENCE:-https://jiten.moe}
      - JwtSettings__AccessTokenExpirationMinutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      - JwtSettings__RefreshTokenExpirationDays=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-30}
      - StaticFilesPath=${STATIC_FILES_PATH:-/app/uploads}
      - UseBunnyCdn=${USE_BUNNYCDN:-false}
      - BunnyCdnSecret=${BUNNYCDN_SECRET:-}
      - BunnyCdnStorageZone=${BUNNYCDN_STORAGE_ZONE:-}
      - CdnBaseUrl=${CDN_BASE_URL:-}
      - DictionaryPath=${DICTIONARY_PATH:-/path/to/system_full.dic}
      - FastTextModelPath=${FASTTEXT_MODEL_PATH:-/app/uploads/models/cc.ja.300.bin}
      - JimakuApiKey=${JIMAKU_API_KEY:-}
      - TmdbApiKey=${TMDB_API_KEY:-}
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT:-}
      - StoreRawText=${STORE_RAW_TEXT:-false}
      - IgdbClientId=${IGDB_CLIENT_ID:-}
      - IgdbClientSecret=${IGDB_CLIENT_SECRET:-}
      - Google__ClientId=${GOOGLE_CLIENT_ID:-}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET:-}
      - Google__RecapatchaSecret=${GOOGLE_RECAPTCHA_SECRET:-}
      - Email__SmtpHost=${SES_SMTP_HOST:-smtp.eu.mailgun.org}
      - Email__SmtpPort=${SES_SMTP_PORT:-587}
      - Email__Username=${SES_SMTP_USER:-}
      - Email__Password=${SES_SMTP_PASSWORD:-}
      - Email__From=${SES_FROM:-noreply@example.com}
      - DiscordWebhook=${DISCORD_WEBHOOK:-}
      - OpenTelemetry__EnableConsoleExporter=${LOG_CONSOLE:-false}
      - OpenTelemetry__EnableOtlpExporter=${LOG_OTLP:-true}
      - OpenTelemetry__Otlp__Endpoint=${LOG_OTLP_ENDPOINT:-}
      - OpenTelemetry__Otlp__Headers=${LOG_OTLP_HEADER:-authorization=TOKEN}
      - RunPod__ApiKey=${RUNPOD_API_KEY:-}
      - RunPod__NovelsEndpointId=${RUNPOD_NOVELS_ENDPOINT_ID:-}
      - RunPod__ShowsEndpointId=${RUNPOD_SHOWS_ENDPOINT_ID:-}
      - IndexNow__Key=${INDEXNOW_KEY:-}
      - IndexNow__SiteUrl=${INDEXNOW_SITE_URL:-https://jiten.moe}
      - VoicevoxUrl=${VOICEVOX_URL:-http://voicevox:50021}
    volumes:
      - ./Shared:/app/Shared:ro
      - uploads:/app/uploads
      - dictionaries:/app/dictionaries
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.jiten.moe`)"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
      - "traefik.http.routers.api.middlewares=jiten-errors"

  # Serves a branded "we'll be right back" page whenever a router has no healthy
  # backend (e.g. a container being recreated during a deploy). Traefik's errors
  # middleware intercepts 502/503/504 and returns this static page with the original
  # status code, instead of Coolify/Traefik's generic "no available server" screen.
  error-pages:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./error-pages:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.error-pages.loadbalancer.server.port=80"
      - "traefik.http.middlewares.jiten-errors.errors.status=502-504"
      - "traefik.http.middlewares.jiten-errors.errors.service=error-pages"
      - "traefik.http.middlewares.jiten-errors.errors.query=/503.html"

  umami:
    image: ghcr.io/umami-software/umami:3.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://umami:umami@postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-replace-me-with-a-random-string}
      HASH_SALT: ${UMAMI_HASH_SALT:-some-random-string}
      PORT: 3005
      TRACKER_SCRIPT_NAME: ${UMAMI_TRACKER_SCRIPT_NAME:-umm.js}
    init: true
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:3005/api/heartbeat || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.umami.rule=Host(`umami.jiten.moe`)"
      - "traefik.http.services.umami.loadbalancer.server.port=3005"

  voicevox:
    image: voicevox/voicevox_engine:cpu-latest
    restart: unless-stopped
    entrypoint: /opt/voicevox_engine/run
    command: --host 0.0.0.0 --port 50021 --cpu_num_threads 4
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:50021/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  redis:
    image: redis:latest
    command: ["redis-server", "--maxmemory", "${REDIS_MAX_MEMORY:-2}gb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads:
  dictionaries:
