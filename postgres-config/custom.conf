# Custom PostgreSQL Configuration

# --- WAL / checkpoints ---
max_wal_size = 8GB
min_wal_size = 2GB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
wal_buffers = 64MB

# --- Memory ---
shared_buffers = 8GB

# Planner hint: estimate of memory available for filesystem cache (does not allocate RAM).
# Host has 64GB; ~20-30GB used regularly by other services, leaving ample cache headroom.
effective_cache_size = 36GB

# Per sort/hash node, per connection. Raised from the 4MB default to keep analytical
# sorts/hashes (frequency lists, deck similarity, kanji computation) in memory.
work_mem = 32MB

# Speeds up VACUUM / CREATE INDEX / ALTER TABLE ADD FOREIGN KEY, etc.
maintenance_work_mem = 2GB

# --- Planner (NVMe SSD) ---
random_page_cost = 1.1
effective_io_concurrency = 200

# --- Parallelism (8+ vCPU) ---
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# Include additional config files
include_dir = '/etc/postgresql/conf.d'
